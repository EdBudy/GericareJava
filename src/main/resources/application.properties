spring.application.name=Gericare

# CONFIGURACIÓN DE BASE DE DATOS
spring.datasource.url=jdbc:postgresql://localhost:5432/gericare
spring.datasource.username=postgres
spring.datasource.password=.
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACIÓN JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# THYMELEAF (FRONTEND)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
logging.level.org.thymeleaf=TRACE

# CONFIGURACIÓN DE EMAIL (GMAIL)

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:connectgericare@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.from=${SPRING_MAIL_FROM:connectgericare@gmail.com}

# Debug para ver en consola si el correo sale o falla
spring.mail.properties.mail.debug=true

# VARIABLE PARA EL LINK DE RECUPERACIÓN
app.base-url=${APP_BASE_URL:https://gericare-web-2026-beh2e0ajecf3h4a4.westus3-01.azurewebsites.net}
