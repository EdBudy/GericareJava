<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Gericare Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/reset-password.css}" />
</head>
<body>

<div id="particles-js-background"></div>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">

        <div class="card shadow-lg">

            <div id="particles-js-card"></div>

            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <img th:src="@{/images/Geri_Logo-..png}" alt="Gericare Connect Logo" class="logo-img" style="width: 80px;">
                    <h4 class="mt-3 fw-bold" style="color: #344767;">Nueva Contraseña</h4>
                    <p class="text-muted small">Ingresa y confirma tu nueva contraseña.</p>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/reset-password}" method="post">
                    <input type="hidden" name="token" th:value="${token}">

                    <!-- Nueva contraseña -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Nueva contraseña</label>
                        <div class="input-group">
                            <input type="password" id="password" name="password" class="form-control"
                                   placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                            <button type="button" class="toggle-password btn btn-outline-secondary"
                                    data-target="password" tabindex="-1">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                        <!-- Medidor de fuerza -->
                        <div class="password-strength mt-2">
                            <div class="progress" style="height: 6px;">
                                <div id="strength-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                            </div>
                            <small id="strength-text" class="text-muted"></small>
                        </div>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                                   placeholder="Repite tu contraseña" required autocomplete="new-password">
                            <button type="button" class="toggle-password btn btn-outline-secondary"
                                    data-target="confirmPassword" tabindex="-1">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                        <small id="match-feedback" class="text-danger d-none">Las contraseñas no coinciden.</small>
                    </div>

                    <div class="d-grid">
                        <button id="btn-submit" type="submit" class="btn btn-primary btn-lg" disabled>
                            Actualizar Contraseña
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/login}" class="text-decoration-none text-muted small">
                        Volver al inicio de sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/particles.min.js}"></script>
<script th:src="@{/js/reset-password.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
